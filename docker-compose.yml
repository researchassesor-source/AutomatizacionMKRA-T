services:
  db:
    image: postgres:16-alpine
    container_name: mkra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mkra
      POSTGRES_PASSWORD: mkra
      POSTGRES_DB: mkra
    ports:
      - "5432:5432"
    volumes:
      - mkra_pgdata:/var/lib/postgresql/data

volumes:
  mkra_pgdata:
